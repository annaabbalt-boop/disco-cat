version: "3.9"

services:
  web:
    image: ghcr.io/annaabbalt-boop/disco-cat:master
    networks:
      - traefik-public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.disco-cat.rule=Host(`disco.cat.anna.bops.name`)
        - traefik.http.routers.disco-cat.entrypoints=websecure
        - traefik.http.routers.disco-cat.tls=true
        - traefik.http.routers.disco-cat.tls.certresolver=letsencrypt
        - traefik.http.services.disco-cat.loadbalancer.server.port=80

networks:
  traefik-public:
    external: true
