name: Swarm Deploy Template

# Copy this file into new repositories as:
# .github/workflows/deploy.yml
# Then update IMAGE_NAME and DOMAIN below.

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/REPLACE_OWNER/REPLACE_REPO
  DOMAIN: replace.example.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:master
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy stack on Swarm manager
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          port: ${{ secrets.SWARM_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p /opt/${{ github.event.repository.name }}/deploy
            cat > /opt/${{ github.event.repository.name }}/deploy/stack.yml <<'EOF'
            version: "3.9"
            services:
              web:
                image: ${{ env.IMAGE_NAME }}:master
                networks:
                  - traefik-public
                deploy:
                  replicas: 1
                  placement:
                    constraints:
                      - node.role == manager
                  labels:
                    - traefik.enable=true
                    - traefik.docker.network=traefik-public
                    - traefik.http.routers.${{ github.event.repository.name }}.rule=Host(`${{ env.DOMAIN }}`)
                    - traefik.http.routers.${{ github.event.repository.name }}.entrypoints=websecure
                    - traefik.http.routers.${{ github.event.repository.name }}.tls=true
                    - traefik.http.routers.${{ github.event.repository.name }}.tls.certresolver=letsencrypt
                    - traefik.http.services.${{ github.event.repository.name }}.loadbalancer.server.port=80
            networks:
              traefik-public:
                external: true
            EOF
            docker stack deploy -c /opt/${{ github.event.repository.name }}/deploy/stack.yml ${{ github.event.repository.name }} --with-registry-auth
