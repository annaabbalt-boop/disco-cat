name: Build & Deploy (Swarm)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/annaabbalt-boop/disco-cat

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=master
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy stack on Swarm manager
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: master
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          port: ${{ secrets.SWARM_SSH_PORT || 22 }}
          script_stop: true
          envs: IMAGE_TAG
          script: |
            set -euo pipefail

            mkdir -p /opt/disco-cat/deploy
            cat > /opt/disco-cat/deploy/stack.yml <<'EOF'
            version: "3.9"

            services:
              web:
                image: ghcr.io/annaabbalt-boop/disco-cat:${IMAGE_TAG}
                networks:
                  - traefik-public
                deploy:
                  replicas: 1
                  placement:
                    constraints:
                      - node.role == manager
                  labels:
                    - traefik.enable=true
                    - traefik.docker.network=traefik-public
                    - traefik.http.routers.disco-cat.rule=Host(`disco.cat.anna.bops.name`)
                    - traefik.http.routers.disco-cat.entrypoints=websecure
                    - traefik.http.routers.disco-cat.tls=true
                    - traefik.http.routers.disco-cat.tls.certresolver=letsencrypt
                    - traefik.http.services.disco-cat.loadbalancer.server.port=80

            networks:
              traefik-public:
                external: true
            EOF

            docker stack deploy -c /opt/disco-cat/deploy/stack.yml disco-cat --with-registry-auth
            docker service ls --filter name=disco-cat_web
